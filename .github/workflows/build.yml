name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          cmdline-tools-version: latest

      # ---------- settings.gradle ----------
      - name: Write settings.gradle (pluginManagement)
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = "ParticleUniverse"
          include ':app'
          EOF

      # ---------- root build.gradle ----------
      - name: Write root build.gradle (repositories for dependencies)
        run: |
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      # ---------- gradle.properties ----------
      - name: Write gradle.properties (enable AndroidX + Jetifier)
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          EOF

      # ---------- app/build.gradle ----------
      - name: Write app/build.gradle (with Material dependency)
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.example.particleuniverse'
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.particleuniverse"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  vectorDrawables.useSupportLibrary = true
              }

              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                      signingConfig signingConfigs.debug
                  }
                  debug {
                      signingConfig signingConfigs.debug
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              buildFeatures {
                  viewBinding true
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

# ---------- AndroidManifest.xml (fixed icons + no package attr) ----------
      - name: Write AndroidManifest.xml
        run: |
          mkdir -p app/src/main
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">

              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-feature android:name="android.hardware.microphone" android:required="false" />
              <uses-feature android:name="android.hardware.sensor.accelerometer" android:required="true" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.ParticleUniverse">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="sensorLandscape"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:theme="@style/Theme.ParticleUniverse.Fullscreen">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # ---------- Remove problematic adaptive-icon folder ----------
      - name: Remove mipmap-anydpi-v26 (uses missing color/drawable refs)
        run: rm -rf app/src/main/res/mipmap-anydpi-v26

      # ---------- Build ----------
      - name: Build with Gradle 8.2
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.2
          arguments: assembleRelease

      # ---------- Upload ----------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
